version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bandjoun-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootbandjoun2024
      MYSQL_USER: recensement_user
      MYSQL_PASSWORD: bandjoun2024
      MYSQL_DATABASE: recensement_bandjoun
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bandjoun-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootbandjoun2024"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bandjoun-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: recensement_user
      DB_PASSWORD: bandjoun2024
      DB_NAME: recensement_bandjoun
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bandjoun-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: bandjoun-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - bandjoun-net

networks:
  bandjoun-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
